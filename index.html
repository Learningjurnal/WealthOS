

<!DOCTYPE html>
<html lang="id" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WealthOS — Personal Family Office</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23006948'/><text x='16' y='22' text-anchor='middle' font-size='18' font-weight='700' fill='white' font-family='Inter,system-ui'>W</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
/* ── Design Tokens — Neon Dark 2026 ── */
:root {
  --neon:#00d4ff; --neon-p:#9b5de5; --neon-g:#00f593;
  --primary:#00d4ff; --on-primary:#020209; --primary-container:rgba(0,212,255,.12); --on-primary-container:#dceeff;
  --primary-fixed:#00d4ff; --primary-fixed-dim:#00aacc; --inverse-primary:#00d4ff;
  --secondary:#9b5de5; --on-secondary:#fff; --secondary-container:rgba(155,93,229,.12); --on-secondary-container:#e9d5ff;
  --tertiary:#00f593; --on-tertiary:#020209; --tertiary-container:rgba(0,245,147,.1); --on-tertiary-container:#ccfde8;
  --error:#f87171; --on-error:#fff; --error-container:rgba(248,113,113,.15); --on-error-container:#fca5a5;
  --surface:#020209; --surface-dim:#020209; --surface-bright:#0d0d22;
  --surface-container-lowest:#020209; --surface-container-low:#08081a;
  --surface-container:#0d0d22; --surface-container-high:#121230; --surface-container-highest:#1a1a38;
  --on-surface:#dceeff; --on-surface-variant:#5a7a9a;
  --outline:rgba(0,212,255,.18); --outline-variant:rgba(0,212,255,.09);
  --inverse-surface:#dceeff; --inverse-on-surface:#020209;
  --shadow:0 4px 16px rgba(0,0,0,.4),0 0 0 1px rgba(0,212,255,.06);
  --shadow-lg:0 12px 40px rgba(0,0,0,.5),0 0 0 1px rgba(0,212,255,.08),0 0 30px rgba(0,212,255,.04);
  --radius-sm:.25rem; --radius:.5rem; --radius-md:.75rem; --radius-lg:1rem; --radius-xl:1.5rem; --radius-full:9999px;
  --glass:rgba(8,8,26,.75);
  --grid-line:rgba(0,212,255,.04);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--surface);color:var(--on-surface);font-size:14px;line-height:1.5;overflow-x:hidden}

/* ── Neon Background Layers ── */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(900px 700px at -5% -10%,rgba(0,212,255,.09),transparent 60%),
    radial-gradient(700px 600px at 105% -5%,rgba(155,93,229,.07),transparent 55%),
    radial-gradient(500px 400px at 50% 110%,rgba(0,245,147,.025),transparent 60%)}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.45;
  background-image:radial-gradient(rgba(0,180,255,.035) 1px,transparent 1px);
  background-size:28px 28px;mask-image:radial-gradient(900px 700px at 50% 25%,black,transparent 78%)}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-grid::before{content:'';position:absolute;inset:-50%;
  background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
  background-size:60px 60px;transform:perspective(600px) rotateX(30deg) translateY(10%);transform-origin:center top;
  mask-image:linear-gradient(to bottom,transparent,rgba(0,0,0,.5) 30%,rgba(0,0,0,.5) 70%,transparent)}
.bg-grid::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,transparent 40%,var(--surface) 100%)}
.bg-corner-tl{position:fixed;top:0;left:0;width:300px;height:300px;z-index:0;pointer-events:none;
  background:radial-gradient(circle at top left,rgba(0,212,255,.07),transparent 70%)}
.bg-corner-br{position:fixed;bottom:0;right:0;width:400px;height:400px;z-index:0;pointer-events:none;
  background:radial-gradient(circle at bottom right,rgba(155,93,229,.06),transparent 70%)}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;font-size:20px;line-height:1;user-select:none}
button,input,select,textarea{font-family:inherit}
input,select,textarea{font-size:14px;color:var(--on-surface)}

/* ── Glass Card ── */
.card{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--outline-variant);border-radius:var(--radius-lg);box-shadow:var(--shadow);position:relative;z-index:1}
.card:hover{border-color:rgba(0,212,255,.2)}
.card-p{padding:16px}
.card-p-lg{padding:24px}

/* ── Header ── */
.header{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:rgba(2,2,9,.82);backdrop-filter:blur(20px);border-bottom:1px solid var(--outline-variant)}
.header-logo{font-size:18px;font-weight:700;letter-spacing:-.03em;color:var(--neon);text-shadow:0 0 20px rgba(0,212,255,.4)}
.header-actions{display:flex;align-items:center;gap:8px}
.icon-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-full);border:1px solid var(--outline-variant);background:var(--surface-container-low);color:var(--on-surface-variant);cursor:pointer;transition:all .2s}
.icon-btn:hover{border-color:var(--neon);color:var(--neon);box-shadow:0 0 10px rgba(0,212,255,.2)}

/* ── Desktop sidebar ── */
.sidebar{position:fixed;top:0;left:0;width:220px;height:100vh;background:rgba(2,2,9,.88);backdrop-filter:blur(24px);border-right:1px solid var(--outline-variant);display:flex;flex-direction:column;z-index:40;overflow-y:auto}
.sidebar-logo{padding:18px 16px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--outline-variant)}
.sidebar-icon{width:32px;height:32px;border-radius:var(--radius);background:var(--neon);display:flex;align-items:center;justify-content:center;color:#020209;font-size:15px;font-weight:700;flex-shrink:0;box-shadow:0 0 14px rgba(0,212,255,.4)}
.sidebar-name{font-size:15px;font-weight:700;letter-spacing:-.03em;color:var(--neon)}
.sidebar-tag{font-size:10px;color:var(--on-surface-variant);margin-top:1px;letter-spacing:.06em;text-transform:uppercase}
.nav-section{padding:14px 12px 4px;font-size:9.5px;font-weight:600;color:var(--on-surface-variant);text-transform:uppercase;letter-spacing:.1em}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;margin:1px 8px;border-radius:var(--radius-md);font-size:13px;color:var(--on-surface-variant);border:none;background:none;width:calc(100% - 16px);text-align:left;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.nav-item .material-symbols-outlined{font-size:18px}
.nav-item:hover{background:rgba(0,212,255,.06);color:var(--on-surface);border-color:rgba(0,212,255,.15)}
.nav-item.active{background:rgba(0,212,255,.1);color:var(--neon);font-weight:600;border-left:2px solid var(--neon)}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--outline-variant);margin-top:auto}
.user-row{display:flex;align-items:center;gap:10px}
.user-av{width:32px;height:32px;border-radius:var(--radius-full);background:rgba(0,212,255,.15);border:1px solid rgba(0,212,255,.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--neon);flex-shrink:0}

/* ── Main layout ── */
.main-desktop{margin-left:220px;padding:76px 24px 32px;position:relative;z-index:1}
.main-mobile{padding:72px 16px 100px;display:none;position:relative;z-index:1}
@media(max-width:768px){.sidebar{display:none}.main-desktop{display:none}.main-mobile{display:block}.header{display:flex}}

/* ── Bottom nav ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:50;flex-direction:row;justify-content:space-around;align-items:center;padding:8px 0 max(8px,env(safe-area-inset-bottom));background:rgba(2,2,9,.9);backdrop-filter:blur(20px);border-top:1px solid var(--outline-variant)}
@media(max-width:768px){.bottom-nav{display:flex}}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 12px;border-radius:var(--radius-lg);border:none;background:none;color:var(--on-surface-variant);cursor:pointer;font-size:10px;font-weight:500;transition:all .2s;flex:1;font-family:'Inter',sans-serif}
.bnav-item.active{background:rgba(0,212,255,.1);color:var(--neon)}
.bnav-item .material-symbols-outlined{font-size:22px}

/* ── Hero ── */
.hero{padding:24px 0;text-align:center}
.hero-label{font-size:11px;font-weight:600;color:var(--on-surface-variant);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;font-family:'JetBrains Mono',monospace}
.hero-value{font-size:42px;font-weight:700;letter-spacing:-.03em;color:var(--neon);line-height:1.1;margin-bottom:10px;text-shadow:0 0 40px rgba(0,212,255,.3)}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:var(--radius-full);font-size:12px;font-weight:600}
.badge-success{background:rgba(0,245,147,.12);color:#00f593;border:1px solid rgba(0,245,147,.25)}
.badge-error{background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.25)}
.badge-warn{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
.badge-info{background:rgba(0,212,255,.12);color:var(--neon);border:1px solid rgba(0,212,255,.25)}

/* ── KPI Grid ── */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
.kpi-card{background:var(--glass);backdrop-filter:blur(8px);border:1px solid var(--outline-variant);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:16px;display:flex;flex-direction:column;justify-content:space-between;min-height:110px}
.kpi-icon{width:36px;height:36px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;margin-bottom:12px;flex-shrink:0}
.kpi-label{font-size:11px;font-weight:600;color:var(--on-surface-variant);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.kpi-value{font-size:18px;font-weight:700;letter-spacing:-.02em;color:var(--on-surface);line-height:1.2}
.kpi-sub{font-size:11px;color:var(--on-surface-variant);margin-top:3px}

/* ── Desktop KPI row ── */
.kpi-row-desktop{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.kpi-row-desktop .kpi-card{min-height:90px}

/* ── Section header ── */
.sec-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sec-title{font-size:16px;font-weight:600;letter-spacing:-.02em}
.sec-link{font-size:12px;font-weight:600;color:var(--primary);background:none;border:none;cursor:pointer}
.sec-link:hover{text-decoration:underline}

/* ── Insight cards ── */
.insight-card{background:var(--glass);backdrop-filter:blur(8px);border:1px solid var(--outline-variant);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:16px;display:flex;gap:14px;margin-bottom:10px;cursor:pointer;transition:transform .15s,box-shadow .15s}
.insight-card:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.insight-icon{width:44px;height:44px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.insight-title{font-size:14px;font-weight:600;margin-bottom:3px}
.insight-desc{font-size:12px;color:var(--on-surface-variant);line-height:1.5}

/* ── Table ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--outline-variant)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 12px;font-size:9.5px;font-weight:600;color:var(--on-surface-variant);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--outline-variant);background:rgba(0,212,255,.03);text-align:left;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--outline-variant);color:var(--on-surface);white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(0,212,255,.04)}
.td-action{display:flex;gap:4px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;font-size:13px;font-weight:600;border-radius:var(--radius);border:1px solid transparent;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'Inter',sans-serif}
.btn-primary{background:var(--neon);color:#020209;border-color:var(--neon);box-shadow:0 0 16px rgba(0,212,255,.3)}
.btn-primary:hover{opacity:.9;box-shadow:0 0 24px rgba(0,212,255,.45)}
.btn-outline{background:transparent;color:var(--on-surface);border-color:var(--outline-variant)}
.btn-outline:hover{background:rgba(0,212,255,.06);border-color:rgba(0,212,255,.3);color:var(--neon)}
.btn-sm{padding:5px 10px;font-size:11px;font-weight:600;border-radius:var(--radius-sm);border:1px solid var(--outline-variant);background:transparent;color:var(--on-surface-variant);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:3px;font-family:'Inter',sans-serif}
.btn-sm:hover{background:rgba(0,212,255,.06);border-color:rgba(0,212,255,.3);color:var(--neon)}
.btn-danger-sm{border-color:rgba(248,113,113,.3);color:#f87171}
.btn-danger-sm:hover{background:rgba(248,113,113,.08);border-color:#f87171}

/* ── Status badge ── */
.pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:var(--radius-full);font-size:10px;font-weight:600;letter-spacing:.04em}
.pill-green{background:rgba(0,245,147,.12);color:#00f593;border:1px solid rgba(0,245,147,.2)}
.pill-red{background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.2)}
.pill-amber{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
.pill-blue{background:rgba(0,212,255,.12);color:var(--neon);border:1px solid rgba(0,212,255,.2)}
.pill-purple{background:rgba(155,93,229,.12);color:#c084fc;border:1px solid rgba(155,93,229,.2)}
.pill-gray{background:var(--surface-container);color:var(--on-surface-variant);border:1px solid var(--outline-variant)}

/* ── Progress bar ── */
.prog-track{height:6px;border-radius:var(--radius-full);background:var(--surface-container);overflow:hidden}
.prog-fill{height:100%;border-radius:var(--radius-full);background:linear-gradient(90deg,var(--neon),var(--neon-p));transition:width .6s ease;box-shadow:0 0 8px rgba(0,212,255,.3)}

/* ── Bank card ── */
.bank-card{border-radius:var(--radius-lg);padding:20px;margin-bottom:10px;color:#fff;position:relative;overflow:hidden;border:1px solid rgba(0,212,255,.15);box-shadow:0 0 20px rgba(0,212,255,.06)}
.bank-card::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.05);pointer-events:none}

/* ── Piutang row ── */
.piu-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--surface-container)}
.piu-row:last-child{border-bottom:none}
.piu-av{width:40px;height:40px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.piu-info{flex:1;min-width:0}
.piu-amt{text-align:right;flex-shrink:0}

/* ── Mini stat ── */
.mini-stat{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--surface-container);font-size:13px}
.mini-stat:last-child{border-bottom:none}

/* ── AI chat ── */
.chat-msgs{padding:14px 16px;min-height:180px;max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.msg-row{display:flex;align-items:flex-end;gap:8px}
.msg-row.user{justify-content:flex-end}
.bubble{padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.6;max-width:84%}
.bubble.ai{background:var(--surface-container);color:var(--on-surface);border-bottom-left-radius:3px}
.bubble.user{background:var(--primary);color:var(--on-primary);border-bottom-right-radius:3px}
.ai-pulse{width:7px;height:7px;border-radius:50%;background:var(--primary);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Modal ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(10px)}
.modal{background:rgba(8,8,26,.95);border:1px solid var(--outline-variant);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg),0 0 40px rgba(0,212,255,.05);width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-header{padding:20px 24px 0;display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--neon)}
.modal-body{padding:20px 24px}
.modal-footer{padding:0 24px 20px;display:flex;gap:8px;justify-content:flex-end}

/* ── Form ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:600;color:var(--on-surface-variant);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border-radius:var(--radius);border:1px solid var(--outline-variant);background:var(--surface-container-low);color:var(--on-surface);font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s;font-family:'Inter',sans-serif}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--neon);box-shadow:0 0 0 2px rgba(0,212,255,.12)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--outline-variant);border-radius:99px}

/* ── Misc ── */
.row2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px;margin-bottom:14px}
@media(max-width:768px){.row2{grid-template-columns:1fr}}
.pos{color:#059669}.neg{color:var(--error)}.muted{color:var(--on-surface-variant)}
.code-blk{background:var(--surface-container);border-radius:var(--radius);padding:12px;font-family:'SF Mono',Monaco,monospace;font-size:11px;color:var(--on-surface-variant);overflow-x:auto;white-space:pre}
.divider{height:1px;background:var(--outline-variant);margin:16px 0}
.donut-wrap{position:relative;flex-shrink:0}
.donut-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;pointer-events:none}
.sim-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.sim-card{background:var(--surface-container);border-radius:var(--radius-md);padding:12px;text-align:center}
.chip{padding:5px 11px;background:var(--surface-container);border:1px solid var(--outline-variant);border-radius:var(--radius-full);font-size:11px;color:var(--on-surface-variant);cursor:pointer;white-space:nowrap;transition:all .12s}
.chip:hover{border-color:var(--primary);color:var(--primary)}
.chips-row{display:flex;gap:6px;flex-wrap:wrap;padding:10px 14px;border-bottom:1px solid var(--outline-variant)}
.sync-banner{background:var(--primary-container);color:var(--on-primary-container);padding:8px 16px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:8px;border-radius:var(--radius-md);margin-bottom:14px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--inverse-surface);color:var(--inverse-on-surface);padding:10px 18px;border-radius:var(--radius-full);font-size:13px;font-weight:500;z-index:300;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap}
@media(min-width:769px){.toast{bottom:24px}}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-corner-tl"></div>
<div class="bg-corner-br"></div>

<!-- ── HEADER (mobile only) ── -->
<header class="header" id="hdr" style="display:none">
  <div style="display:flex;align-items:center;gap:8px">
    <div style="width:28px;height:28px;border-radius:6px;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700">W</div>
    <span class="header-logo">WealthOS</span>
  </div>
  <div class="header-actions">
    <span id="sync-status" style="font-size:10px;color:var(--on-surface-variant)"></span>
    <button class="icon-btn" onclick="toggleTheme()" title="Toggle dark mode"><span class="material-symbols-outlined">dark_mode</span></button>
  </div>
</header>

<!-- ── SIDEBAR (desktop) ── -->
<div class="sidebar">

const rp = n => {
  const a=Math.abs(n),s=n<0?'-':'';
  if(a>=1e12)return s+'Rp '+(a/1e12).toFixed(2)+' T';
  if(a>=1e9) return s+'Rp '+(a/1e9).toFixed(2)+' M';
  if(a>=1e6) return s+'Rp '+(a/1e6).toFixed(1)+' jt';
  return s+'Rp '+Math.round(a).toLocaleString('id-ID');
};
const fmt = n => Math.round(n).toLocaleString('id-ID');
const safePct = (num, denom) => denom > 0 ? (num/denom*100) : 0;

function toast(msg,dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0',dur);
}

function calc(){
  const s=D.saham.reduce((a,x)=>{const n=x.lot*100*x.kini,b=x.lot*100*x.beli;return{v:a.v+n,b:a.b+b,d:a.d+x.lot*100*x.div*0.9};},{v:0,b:0,d:0});
  const e=D.etf.reduce((a,x)=>{const n=x.unit*x.kini*USD,b=x.unit*x.basis*USD;return{v:a.v+n,b:a.b+b,d:a.d+x.unit*x.div*USD*(1-x.wht/100)};},{v:0,b:0,d:0});
  const c=D.crypto.reduce((a,x)=>({v:a.v+x.qty*x.kini,b:a.b+x.qty*x.basis}),{v:0,b:0});
  const p=D.p2p.reduce((a,x)=>({v:a.v+x.outstanding,d:a.d+x.outstanding*x.rate/100/12}),{v:0,d:0});
  const bankTotal=D.bank.reduce((s,x)=>s+x.saldo,0);
  const piu=D.piutang.reduce((a,x)=>({total:a.total+(x.pokok-x.terbayar),pokok:a.pokok+x.pokok,terbayar:a.terbayar+x.terbayar}),{total:0,pokok:0,terbayar:0});
  const debt=D.debt.reduce((a,x)=>({t:a.t+x.outstanding,c:a.c+x.cicilan}),{t:0,c:0});
  const aset=s.v+e.v+c.v+p.v+bankTotal+D.deposito+D.emas+D.obligasi+piu.total;
  const passive=s.d+e.d+p.d*12+D.deposito*0.055+D.obligasi*0.065;
  const denom = D.income+passive/12;
  const emMonths = denom>0 ? bankTotal/denom : 0;
  const ws=wScore({s,e,c,p,bankTotal,debt,aset,passive,emMonths});
  return{s,e,c,p,bankTotal,piu,debt,aset,net:aset-debt.t,passive,emMonths,ws};
}

function wScore({s,e,c,p,bankTotal,debt,aset,passive,emMonths}){
  if(aset<=0) return 0; // belum ada data sama sekali
  let sc=0;const dr=debt.t/aset;
  sc+=dr<0.2?25:dr<0.4?15:5;
  sc+=emMonths>=6?20:emMonths>=3?12:4;
  sc+=((s.v>0?1:0)+(e.v>0?1:0)+(c.v>0?1:0)+(p.v>0?1:0))*5;
  const pc = D.income>0 ? (passive/12)/D.income : 0;
  sc+=pc>=0.5?20:pc>=0.3?12:5;
  const nw=aset-debt.t;
  sc+=nw>1e9?15:nw>5e8?10:5;
  return Math.min(100,sc);
}

const SB_CONFIGURED = !SUPABASE_URL.includes('GANTI_DENGAN');

function setSyncStatus(msg){
  const color = msg.includes('✓') ? 'var(--primary)' : msg.includes('⚠') ? 'var(--error)' : 'var(--on-surface-variant)';
  document.querySelectorAll('#sync-status').forEach(el => {
    el.textContent = msg;
    el.style.color = color;
  });
}

async function initSupabase(){
  if(!SB_CONFIGURED){ setSyncStatus('⚡ Lokal'); return; }
  setSyncStatus('🔄 Menghubungkan...');
  await loadFromSupabase();
}

async function loadFromSupabase(){
  if(!SB_CONFIGURED)return;
  try{
    const{data,error}=await sb.from('wealthos_data')
      .select('payload')
      .eq('device_id', DEVICE_ID)
      .maybeSingle();
    if(error)throw error;
    if(data?.payload){
      const parsed = JSON.parse(data.payload);
      if(parsed && typeof parsed === 'object'){
        D = parsed;
        navTo(currentPage);
        setSyncStatus('✓ Tersinkron');
      }
    } else {
      // Belum ada data di Supabase untuk device ini — simpan state saat ini
      await saveToSupabase();
      setSyncStatus('✓ Terhubung');
    }
  }catch(e){
    setSyncStatus('⚠ '+e.message);
    console.error('Supabase load error:',e);
  }
}

async function saveToSupabase(){
  if(!SB_CONFIGURED)return;
  setSyncStatus('🔄 Menyimpan...');
  try{
    const{error}=await sb.from('wealthos_data').upsert(
      {device_id:DEVICE_ID, payload:JSON.stringify(D), updated_at:new Date().toISOString()},
      {onConflict:'device_id'}
    );
    if(error)throw error;
    setSyncStatus('✓ Tersinkron');
  }catch(e){
    setSyncStatus('⚠ '+(e.message||'Gagal simpan'));
    console.error('Supabase save error:',e);
  }
}

function saveLocal(){
  try{localStorage.setItem('wealthos_data',JSON.stringify(D));}catch{}
  saveToSupabase();
}

function loadLocal(){
  try{
    const raw = localStorage.getItem('wealthos_data');
    if(!raw) return; // belum pernah simpan — D tetap DEFAULT_DATA (kosong)
    const d = JSON.parse(raw);
    if(d && typeof d === 'object') D = d;
  }catch(e){
    console.error('WealthOS: loadLocal error',e);
    localStorage.removeItem('wealthos_data');
  }
}

function processCSV(type){
  const file=document.getElementById('csvFile')?.files[0];
  if(!file){toast('Pilih file CSV dulu');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.trim().split('\n');
    const headers=lines[0].split(',').map(h=>h.trim());
    const rows=lines.slice(1).map(l=>{
      const vals=l.split(',').map(v=>v.trim());
      const obj={id:Date.now()+Math.random()};
      headers.forEach((h,i)=>obj[h]=isNaN(vals[i])||vals[i]===''?vals[i]:parseFloat(vals[i]));
      return obj;
    }).filter(r=>Object.values(r).some(v=>v));
    if(!rows.length){toast('Tidak ada data valid');return;}
    D[type]=[...D[type],...rows];
    saveLocal();navTo(currentPage);
    closeModal();toast(`✓ ${rows.length} baris diimport`);
  };
  reader.readAsText(file);
}

function buildInsights(a){
  const ins=[];
  const cc=D.debt.find(x=>x.bunga>20);
  if(cc)ins.push({icon:'priority_high',bg:'#fef2f2',ic:'#991b1b',title:`Kartu Kredit ${cc.bunga}% p.a.`,desc:`${cc.nama}: ${rp(cc.outstanding)} dengan bunga tertinggi. Lunasi segera untuk hemat bunga terbesar.`,label:'Prioritas 1',labelClass:'pill-red'});
  const telat=D.piutang.filter(x=>x.status==='Telat');
  telat.forEach(x=>ins.push({icon:'person_search',bg:'#fffbeb',ic:'#92400e',title:`Piutang Telat: ${x.nama}`,desc:`Sisa ${rp(x.pokok-x.terbayar)}, jatuh tempo ${new Date(x.jatuhTempo).toLocaleDateString('id-ID',{day:'numeric',month:'short'})}`,label:'Perlu Tindakan',labelClass:'pill-amber'}));
  const goto=D.saham.find(x=>x.kode==='GOTO'||((x.kini/x.beli-1)<-0.4));
  if(goto&&goto.kini<goto.beli){const pl=((goto.kini/goto.beli-1)*100).toFixed(0);ins.push({icon:'trending_down',bg:'#fef2f2',ic:'#991b1b',title:`${goto.kode} Rugi ${Math.abs(pl)}%`,desc:`${goto.nama}: Evaluasi hold atau cut loss untuk realokasi ke aset lebih produktif.`,label:'Review',labelClass:'pill-gray'});}
  if(a.emMonths<3)ins.push({icon:'shield',bg:'#fffbeb',ic:'#92400e',title:'Dana Darurat Kritis',desc:`Hanya ${a.emMonths.toFixed(1)} bulan. Target minimal 3 bulan (${rp(D.income*3)}).`,label:'Urgent',labelClass:'pill-red'});
  if(!ins.length)ins.push({icon:'check_circle',bg:'#ecfdf5',ic:'#065f46',title:'Portofolio Sehat',desc:'Tidak ada masalah kritis terdeteksi. Tetap pantau secara berkala.',label:'Baik',labelClass:'pill-green'});
  return ins.slice(0,4).map(x=>`
  <div class="insight-card">
    <div class="insight-icon" style="background:${x.bg}"><span class="material-symbols-outlined" style="color:${x.ic}">${x.icon}</span></div>
    <div style="flex:1">

      <div class="insight-desc">${x.desc}</div>
    </div>
  </div>`).join('');
}

function initAI(){
  if(aiMsgs.length===0){
    const a=calc();
    aiMsgs=[{r:'ai',t:`Portofolio Anda dianalisis. Net worth **${rp(a.net)}**, passive income **${rp(a.passive/12)}/bln**.\n\n3 prioritas:\n• **Kartu Kredit ${D.debt.find(x=>x.bunga>20)?.bunga||25.5}%** — lunasi segera\n• **${D.piutang.find(x=>x.status==='Telat')?.nama||'Tidak ada'}** — piutang telat\n• **Diversifikasi** — saham perbankan dominan`}];
  }
  renderMsgs();
}

function renderMsgs(){
  const el=document.getElementById('aiMsgs');
  if(!el)return;
  el.innerHTML=aiMsgs.map(m=>`<div class="msg-row ${m.r==='user'?'user':''}">
    ${m.r==='ai'?`<div style="width:24px;height:24px;border-radius:50%;background:var(--primary-container);display:flex;align-items:center;justify-content:center;flex-shrink:0"><span class="material-symbols-outlined" style="font-size:13px;color:var(--primary)">auto_awesome</span></div>`:''}
    <div class="bubble ${m.r==='ai'?'ai':'user'} ${m.loading?'loading':''}">${(m.t||'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</div>
    ${m.r==='user'?`<div style="width:24px;height:24px;border-radius:50%;background:var(--secondary-container);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--on-secondary-container);flex-shrink:0">ZA</div>`:''}
  </div>`).join('');
  el.scrollTop=el.scrollHeight;
}

async function sendAI(msg){
  const inp=document.getElementById('aiIn');
  const txt=msg||(inp?.value.trim()||'');
  if(!txt)return;
  if(inp)inp.value='';
  aiMsgs.push({r:'user',t:txt});
  aiMsgs.push({r:'ai',t:'Menganalisis...',loading:true});
  renderMsgs();
  const btn=document.getElementById('aiBtn');
  if(btn)btn.disabled=true;
  try{
    const res=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:getCtx()+'\n\n---\nPertanyaan: '+txt}]})});
    const data=await res.json();
    aiMsgs[aiMsgs.length-1]={r:'ai',t:data.content?.[0]?.text||data.error||'Terjadi kesalahan.'};
  }catch(e){aiMsgs[aiMsgs.length-1]={r:'ai',t:'Gagal: '+e.message};}
  renderMsgs();
  if(btn)btn.disabled=false;
}

function quickAsk(q){sendAI(q);}

function drawAllocChart(){

  const vals=[a.s.v,a.e.v,a.c.v,a.p.v,a.bankTotal,D.deposito,D.emas,D.obligasi];

  if(!canvas||!window.Chart)return;
  new Chart(canvas,{type:'doughnut',data:{labels:['Saham','ETF','Crypto','P2P','Bank','Deposito','Emas','Obligasi'],datasets:[{data:vals,backgroundColor:cols,borderWidth:2,borderColor:getComputedStyle(document.documentElement).getPropertyValue('--surface-container-lowest')||'#fff'}]},options:{cutout:'68%',responsive:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+rp(c.raw)+' ('+((c.raw/vals.reduce((a,b)=>a+b))*100).toFixed(1)+'%)'}}}}}); 
}

function drawFireChart(){
  const a=calc();const target=a.passive*25;
  const labels=[],vals=[],tgts=[];let nw=a.net;
  for(let i=0;i<=20;i++){labels.push(new Date().getFullYear()+i);vals.push(+(nw/1e9).toFixed(2));tgts.push(+(target/1e9).toFixed(2));nw=nw*1.12+5e6*12;}
  const canvas=document.getElementById('fireC');
  if(!canvas||!window.Chart)return;
  new Chart(canvas,{type:'line',data:{labels,datasets:[{label:'Net Worth',data:vals,borderColor:'var(--primary)',backgroundColor:'rgba(0,105,72,.07)',fill:true,tension:0.4,pointRadius:2},{label:'FIRE Target',data:tgts,borderColor:'#f59e0b',borderDash:[5,4],pointRadius:0,fill:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'Rp'+v+'M'}},x:{ticks:{maxTicksLimit:6}}}}});
}

function initProjChart(){
  const a=calc();let ch=null;
  function update(){
    const cagr=parseInt(document.getElementById('cagr')?.value||12)/100;
    const infl=parseInt(document.getElementById('infl')?.value||5)/100;
    const inv=parseInt(document.getElementById('inv')?.value||5)*1e6;
    document.getElementById('cagrV').textContent=Math.round(cagr*100)+'%';
    document.getElementById('inflV').textContent=Math.round(infl*100)+'%';
    document.getElementById('invV').textContent='Rp'+Math.round(inv/1e6)+'jt';
    let nN=a.net,nR=a.net;
    const noms=[],reals=[],lbls=[];
    for(let i=0;i<=20;i++){lbls.push(new Date().getFullYear()+i);noms.push(+(nN/1e9).toFixed(2));reals.push(+(nR/1e9).toFixed(2));nN=nN*(1+cagr)+inv*12;nR=nR*(1+cagr-infl)+inv*12;}
    document.getElementById('simCards').innerHTML=[5,10,20].map(y=>`<div class="sim-card"><div style="font-size:10px;color:var(--on-surface-variant);margin-bottom:5px">${y} Thn (${new Date().getFullYear()+y})</div><div style="font-size:15px;font-weight:700">${rp(noms[y]*1e9)}</div><div style="font-size:10px;color:var(--primary)">Real: ${rp(reals[y]*1e9)}</div></div>`).join('');
    if(ch)ch.destroy();
    ch=new Chart(document.getElementById('projC'),{type:'line',data:{labels:lbls,datasets:[{label:'Nominal',data:noms,borderColor:'var(--primary)',fill:false,tension:0.4,pointRadius:2},{label:'Real',data:reals,borderColor:'var(--on-surface-variant)',borderDash:[4,3],fill:false,tension:0.4,pointRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'Rp'+v+'M'}},x:{ticks:{maxTicksLimit:6}}}}});
  }
  setTimeout(()=>{['cagr','infl','inv'].forEach(id=>document.getElementById(id)?.addEventListener('input',update));update();},100);
}

function modalTransaksi(item=null){
  const edit=!!item;
  const cats=['Makan & Minum','Transport','Belanja','Tagihan','Kesehatan','Hiburan','Pendidikan','Investasi','Lainnya'];
  openModal(`
  <div class="modal-header"><div class="modal-title">${edit?'Edit':'Tambah'} Transaksi</div><button class="icon-btn" onclick="closeModal()"><span class="material-symbols-outlined">close</span></button></div>
  <div class="modal-body">
    <div class="field-row">
      <div class="field"><label>Tanggal</label><input type="date" id="tx-tgl" value="${item?.tanggal||new Date().toISOString().slice(0,10)}"></div>
      <div class="field"><label>Tipe</label><select id="tx-tipe"><option ${item?.tipe==='Keluar'?'selected':''}>Keluar</option><option ${item?.tipe==='Masuk'?'selected':''}>Masuk</option></select></div>
    </div>
    <div class="field"><label>Keterangan</label><input type="text" id="tx-ket" value="${item?.keterangan||''}" placeholder="Contoh: Makan siang, Gaji, dll"></div>
    <div class="field-row">
      <div class="field"><label>Kategori</label><select id="tx-kat">${cats.map(c=>`<option ${item?.kategori===c?'selected':''}>${c}</option>`).join('')}</select></div>
      <div class="field"><label>Jumlah (Rp)</label><input type="number" id="tx-jml" value="${item?.jumlah||''}" placeholder="150000"></div>
    </div>
    <div class="field"><label>Catatan</label><textarea id="tx-note" rows="2" placeholder="Opsional...">${item?.catatan||''}</textarea></div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-outline" onclick="closeModal()">Batal</button>
    <button class="btn btn-primary" onclick="saveTx(${edit?item.id:'null'})">Simpan</button>
  </div>`);
}

function saveTx(id){
  const obj={id:id||uid(),tanggal:document.getElementById('tx-tgl').value,tipe:document.getElementById('tx-tipe').value,keterangan:document.getElementById('tx-ket').value,kategori:document.getElementById('tx-kat').value,jumlah:parseFloat(document.getElementById('tx-jml').value)||0,catatan:document.getElementById('tx-note').value};
  if(!obj.keterangan||!obj.jumlah){toast('Isi keterangan dan jumlah');return;}
  if(!D.transaksi)D.transaksi=[];
  if(id){D.transaksi=D.transaksi.map(x=>x.id==id?obj:x);}else{D.transaksi.push(obj);}
  saveLocal();navTo('transaksi');closeModal();toast('✓ Transaksi disimpan');
}

// ══════════════════════════════════════════════
// HALAMAN GAJI & BONUS
// ══════════════════════════════════════════════
function pgGaji(){
  const list = (D.salary||[]).slice().sort((a,b)=>new Date(b.periode)-new Date(a.periode));
  const totalGaji = list.reduce((s,x)=>s+x.gaji_pokok,0);
  const totalBonus = list.reduce((s,x)=>s+(x.bonus||0),0);
  const totalTHR = list.reduce((s,x)=>s+(x.thr||0),0);
  const totalBersih = list.reduce((s,x)=>s+x.take_home,0);
  const avg = list.length>0?totalBersih/list.length:0;
  return `
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
  <div style="font-size:17px;font-weight:700;color:var(--neon)">Gaji & Bonus</div>
  <button class="btn btn-primary" onclick="modalGaji()"><span class="material-symbols-outlined" style="font-size:14px">add</span> Tambah</button>
</div>
<div class="kpi-row-desktop" style="margin-bottom:16px">
  <div class="kpi-card"><div class="kpi-icon" style="background:rgba(0,212,255,.1)"><span class="material-symbols-outlined" style="color:var(--neon);font-size:18px">payments</span></div><div class="kpi-label">Total Gaji Pokok</div><div class="kpi-value">${rp(totalGaji)}</div></div>
  <div class="kpi-card"><div class="kpi-icon" style="background:rgba(155,93,229,.1)"><span class="material-symbols-outlined" style="color:#c084fc;font-size:18px">stars</span></div><div class="kpi-label">Total Bonus</div><div class="kpi-value" style="color:#c084fc">${rp(totalBonus)}</div></div>
  <div class="kpi-card"><div class="kpi-icon" style="background:rgba(251,191,36,.1)"><span class="material-symbols-outlined" style="color:#fbbf24;font-size:18px">redeem</span></div><div class="kpi-label">Total THR</div><div class="kpi-value" style="color:#fbbf24">${rp(totalTHR)}</div></div>
  <div class="kpi-card"><div class="kpi-icon" style="background:rgba(0,245,147,.1)"><span class="material-symbols-outlined" style="color:#00f593;font-size:18px">savings</span></div><div class="kpi-label">Rata-rata Take Home</div><div class="kpi-value" style="color:#00f593">${rp(avg)}</div></div>
</div>
<div class="card" style="margin-bottom:14px">
  ${list.length===0?'<div style="text-align:center;color:var(--on-surface-variant);padding:32px 0;font-size:13px">Belum ada data gaji. Klik Tambah untuk mulai mencatat.</div>':''}
  <div class="tbl-wrap" ${list.length===0?'style="display:none"':''}>
    <table><thead><tr><th>Periode</th><th>Gaji Pokok</th><th>Tunjangan</th><th>Bonus</th><th>THR</th><th>Potongan</th><th>Take Home</th><th>Ket.</th><th>Aksi</th></tr></thead>
    <tbody>${list.map(x=>`<tr>
      <td style="font-weight:600">${x.periode}</td>
      <td>${rp(x.gaji_pokok)}</td>
      <td style="color:var(--neon)">${rp(x.tunjangan||0)}</td>
      <td style="color:#c084fc;font-weight:600">${x.bonus?rp(x.bonus):'—'}</td>
      <td style="color:#fbbf24;font-weight:600">${x.thr?rp(x.thr):'—'}</td>
      <td style="color:#f87171">- ${rp(x.potongan||0)}</td>
      <td style="font-weight:700;color:#00f593">${rp(x.take_home)}</td>
      <td style="color:var(--on-surface-variant);font-size:12px;max-width:120px;overflow:hidden;text-overflow:ellipsis">${x.catatan||'—'}</td>
      <td><div class="td-action">
        <button class="btn-sm" onclick="modalGaji(${JSON.stringify(x).replace(/"/g,'&quot;')})"><span class="material-symbols-outlined" style="font-size:13px">edit</span></button>
        <button class="btn-sm btn-danger-sm" onclick="confirmDelete('salary',${x.id},'${x.periode}')"><span class="material-symbols-outlined" style="font-size:13px">delete</span></button>
      </div></td>
    </tr>`).join('')}</tbody></table>
  </div>
</div>`;
}

function modalGaji(item=null){
  const edit=!!item;
  const now=new Date();
  const defPeriode=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  openModal(`
  <div class="modal-header"><div class="modal-title">${edit?'Edit':'Tambah'} Slip Gaji</div><button class="icon-btn" onclick="closeModal()"><span class="material-symbols-outlined">close</span></button></div>
  <div class="modal-body">
    <div class="field-row">
      <div class="field"><label>Periode (Bulan)</label><input type="month" id="g-per" value="${item?.periode||defPeriode}"></div>
      <div class="field"><label>Gaji Pokok (Rp)</label><input type="number" id="g-gp" value="${item?.gaji_pokok||''}" placeholder="10000000"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Tunjangan (Rp)</label><input type="number" id="g-tunj" value="${item?.tunjangan||''}" placeholder="0"></div>
      <div class="field"><label>Potongan/BPJS (Rp)</label><input type="number" id="g-pot" value="${item?.potongan||''}" placeholder="0"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Bonus (Rp)</label><input type="number" id="g-bon" value="${item?.bonus||''}" placeholder="0"></div>
      <div class="field"><label>THR (Rp)</label><input type="number" id="g-thr" value="${item?.thr||''}" placeholder="0"></div>
    </div>
    <div class="field"><label>Catatan</label><textarea id="g-note" rows="2" placeholder="Contoh: Bonus Q1, naik gaji, dll">${item?.catatan||''}</textarea></div>
    <div style="background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.15);border-radius:var(--radius);padding:10px 12px;font-size:12px;color:var(--on-surface-variant)">
      Take Home = Gaji Pokok + Tunjangan + Bonus + THR - Potongan
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-outline" onclick="closeModal()">Batal</button>
    <button class="btn btn-primary" onclick="saveGaji(${edit?item.id:'null'})">Simpan</button>
  </div>`);
}

function saveGaji(id){
  const gp=parseFloat(document.getElementById('g-gp').value)||0;
  const tunj=parseFloat(document.getElementById('g-tunj').value)||0;
  const pot=parseFloat(document.getElementById('g-pot').value)||0;
  const bon=parseFloat(document.getElementById('g-bon').value)||0;
  const thr=parseFloat(document.getElementById('g-thr').value)||0;
  const obj={id:id||uid(),periode:document.getElementById('g-per').value,gaji_pokok:gp,tunjangan:tunj,potongan:pot,bonus:bon,thr:thr,take_home:gp+tunj+bon+thr-pot,catatan:document.getElementById('g-note').value};
  if(!obj.gaji_pokok){toast('Isi gaji pokok dulu');return;}
  if(!D.salary)D.salary=[];
  if(id){D.salary=D.salary.map(x=>x.id==id?obj:x);}else{D.salary.push(obj);}
  D.income=obj.gaji_pokok+obj.tunjangan;
  saveLocal();navTo('gaji');closeModal();toast('✓ Slip gaji disimpan');
}

// ══════════════════════════════════════════════
// HALAMAN PEMBAYARAN HUTANG
// ══════════════════════════════════════════════
function pgDebtPay(){
  const payments=(D.debtPayments||[]).slice().sort((a,b)=>new Date(b.tanggal)-new Date(a.tanggal));
  const totalBayar=payments.reduce((s,x)=>s+x.jumlah,0);
  const totalBunga=payments.reduce((s,x)=>s+(x.bunga_dibayar||0),0);
  const totalPokok=payments.reduce((s,x)=>s+(x.pokok_dibayar||0),0);
  const debtNames=[...new Set(D.debt.map(x=>x.nama))];
  return `
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
  <div style="font-size:17px;font-weight:700;color:var(--neon)">Pembayaran Hutang</div>
  <button class="btn btn-primary" onclick="modalDebtPay()"><span class="material-symbols-outlined" style="font-size:14px">add</span> Catat Pembayaran</button>
</div>
<div class="kpi-row-desktop" style="margin-bottom:16px">
  <div class="kpi-card"><div class="kpi-icon" style="background:rgba(0,245,147,.1)"><span class="material-symbols-outlined" style="color:#00f593;font-size:18px">price_check</span></div><div class="kpi-label">Total Sudah Dibayar</div><div class="kpi-value" style="color:#00f593">${rp(totalBayar)}</div></div>
  <div class="kpi-card"><div class="kpi-icon" style="background:rgba(0,212,255,.1)"><span class="material-symbols-outlined" style="color:var(--neon);font-size:18px">account_balance</span></div><div class="kpi-label">Pokok Terbayar</div><div class="kpi-value">${rp(totalPokok)}</div></div>
  <div class="kpi-card"><div class="kpi-icon" style="background:rgba(248,113,113,.1)"><span class="material-symbols-outlined" style="color:#f87171;font-size:18px">percent</span></div><div class="kpi-label">Bunga Dibayar</div><div class="kpi-value" style="color:#f87171">${rp(totalBunga)}</div></div>
  <div class="kpi-card"><div class="kpi-icon" style="background:rgba(155,93,229,.1)"><span class="material-symbols-outlined" style="color:#c084fc;font-size:18px">receipt_long</span></div><div class="kpi-label">Jumlah Pembayaran</div><div class="kpi-value">${payments.length}</div></div>
</div>
${D.debt.length>0?`
<div style="margin-bottom:14px">
  ${D.debt.map(d=>{
    const bayar=payments.filter(p=>p.nama_hutang===d.nama).reduce((s,x)=>s+x.jumlah,0);
    const pct=d.outstanding>0?Math.min(100,(bayar/(bayar+d.outstanding)*100)):100;
    return `<div class="card card-p" style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div><div style="font-weight:600;font-size:13px">${d.nama}</div><div style="font-size:11px;color:var(--on-surface-variant)">${d.tipe} · ${d.bunga}% p.a.</div></div>
        <div style="text-align:right"><div style="font-weight:700;color:#f87171;font-size:13px">${rp(d.outstanding)}</div><div style="font-size:11px;color:#00f593">Dibayar: ${rp(bayar)}</div></div>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct.toFixed(0)}%;background:linear-gradient(90deg,#00f593,#00d4ff)"></div></div>
      <div style="font-size:10px;color:var(--on-surface-variant);margin-top:4px">${pct.toFixed(1)}% terlunasi</div>
    </div>`;
  }).join('')}
</div>`:''}
<div class="card">
  ${payments.length===0?'<div style="text-align:center;color:var(--on-surface-variant);padding:32px 0;font-size:13px">Belum ada riwayat pembayaran. Klik Catat Pembayaran untuk mulai.</div>':''}
  <div class="tbl-wrap" ${payments.length===0?'style="display:none"':''}>
    <table><thead><tr><th>Tanggal</th><th>Nama Hutang</th><th>Total Bayar</th><th>Pokok</th><th>Bunga</th><th>Metode</th><th>Catatan</th><th>Aksi</th></tr></thead>
    <tbody>${payments.map(x=>`<tr>
      <td style="color:var(--on-surface-variant);font-size:12px">${x.tanggal}</td>
      <td><strong>${x.nama_hutang}</strong></td>
      <td style="font-weight:700;color:#00f593">${rp(x.jumlah)}</td>
      <td>${rp(x.pokok_dibayar||0)}</td>
      <td style="color:#f87171">${rp(x.bunga_dibayar||0)}</td>
      <td><span class="pill pill-blue">${x.metode||'Transfer'}</span></td>
      <td style="color:var(--on-surface-variant);font-size:12px">${x.catatan||'—'}</td>
      <td><div class="td-action">
        <button class="btn-sm btn-danger-sm" onclick="confirmDelete('debtPayments',${x.id},'Pembayaran ${x.nama_hutang}')"><span class="material-symbols-outlined" style="font-size:13px">delete</span></button>
      </div></td>
    </tr>`).join('')}</tbody></table>
  </div>
</div>`;
}

function modalDebtPay(){
  const debtNames=D.debt.map(x=>x.nama);
  const today=new Date().toISOString().slice(0,10);
  openModal(`
  <div class="modal-header"><div class="modal-title">Catat Pembayaran Hutang</div><button class="icon-btn" onclick="closeModal()"><span class="material-symbols-outlined">close</span></button></div>
  <div class="modal-body">
    <div class="field-row">
      <div class="field"><label>Tanggal</label><input type="date" id="dp-tgl" value="${today}"></div>
      <div class="field"><label>Nama Hutang</label><select id="dp-nama">${debtNames.length?debtNames.map(n=>`<option>${n}</option>`).join(''):'<option>— Tambah hutang dulu —</option>'}</select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Bayar Pokok (Rp)</label><input type="number" id="dp-pok" placeholder="0" oninput="calcTotalPay()"></div>
      <div class="field"><label>Bayar Bunga (Rp)</label><input type="number" id="dp-bng" placeholder="0" oninput="calcTotalPay()"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Total Bayar (Rp)</label><input type="number" id="dp-tot" placeholder="0" readonly style="background:rgba(0,212,255,.05);color:var(--neon);font-weight:700"></div>
      <div class="field"><label>Metode</label><select id="dp-met"><option>Transfer</option><option>Auto Debet</option><option>Tunai</option><option>Virtual Account</option></select></div>
    </div>
    <div class="field"><label>Catatan</label><textarea id="dp-note" rows="2" placeholder="Opsional..."></textarea></div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-outline" onclick="closeModal()">Batal</button>
    <button class="btn btn-primary" onclick="saveDebtPay()">Simpan</button>
  </div>`);
}

function calcTotalPay(){
  const p=parseFloat(document.getElementById('dp-pok').value)||0;
  const b=parseFloat(document.getElementById('dp-bng').value)||0;
  document.getElementById('dp-tot').value=p+b;
}

function saveDebtPay(){
  const nama=document.getElementById('dp-nama').value;
  const pok=parseFloat(document.getElementById('dp-pok').value)||0;
  const bng=parseFloat(document.getElementById('dp-bng').value)||0;
  const tot=pok+bng;
  if(!tot){toast('Isi minimal pokok atau bunga');return;}
  const obj={id:uid(),tanggal:document.getElementById('dp-tgl').value,nama_hutang:nama,pokok_dibayar:pok,bunga_dibayar:bng,jumlah:tot,metode:document.getElementById('dp-met').value,catatan:document.getElementById('dp-note').value};
  if(!D.debtPayments)D.debtPayments=[];
  D.debtPayments.push(obj);
  // kurangi outstanding hutang
  const debt=D.debt.find(x=>x.nama===nama);
  if(debt&&pok>0){debt.outstanding=Math.max(0,debt.outstanding-pok);}
  saveLocal();navTo('debtpay');closeModal();toast('✓ Pembayaran dicatat, outstanding diperbarui');
}

function navTo(page){
  currentPage=page;
  document.querySelectorAll('.nav-item[data-page],.bnav-item[data-page]').forEach(b=>{
    b.classList.toggle('active',b.dataset.page===page);
  });
  const map={dashboard:pgDash,bank:pgBank,portfolio:pgPortfolio,market:pgMarket,debt:pgDebt,debtpay:pgDebtPay,piutang:pgPiutang,fire:pgFire,projection:pgProj,tax:pgTax,ai:pgAI,settings:pgSettings,transaksi:pgTransaksi,gaji:pgGaji};
  const html=(map[page]||pgDash)();
  document.getElementById('main-d').innerHTML=html;
  document.getElementById('main-m').innerHTML=html;
  if(page==='dashboard')setTimeout(drawAllocChart,80);
  if(page==='fire')setTimeout(drawFireChart,80);
  if(page==='projection')setTimeout(initProjChart,80);
  if(page==='ai')initAI();
  window.scrollTo(0,0);
}

document.querySelectorAll('.nav-item[data-page],.bnav-item[data-page]').forEach(b=>{
  b.addEventListener('click',()=>navTo(b.dataset.page));
});

  const isMobile=window.innerWidth<=768;
  document.getElementById('hdr').style.display=isMobile?'flex':'none';

window.addEventListener('resize',detectMobile);
detectMobile();

loadLocal();
navTo('dashboard');
setTimeout(fetchPrices,800);
initSupabase();
</script>
