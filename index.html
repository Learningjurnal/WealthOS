<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WealthOS — Personal Family Office</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231D9E75'/><text x='16' y='22' text-anchor='middle' font-size='18' font-weight='700' fill='white' font-family='system-ui'>W</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root{
  --green:#1D9E75;--green-l:#E1F5EE;--green-d:#0F6E56;
  --blue:#378ADD;--blue-l:#E6F1FB;--blue-d:#185FA5;
  --amber:#EF9F27;--amber-l:#FAEEDA;--amber-d:#854F0B;
  --red:#E24B4A;--red-l:#FCEBEB;--red-d:#A32D2D;
  --purple:#534AB7;--purple-l:#EEEDFE;--purple-d:#3C3489;
  --gray:#888780;--gray-l:#F1EFE8;--gray-d:#2C2C2A;
  --bg:#f5f5f3;--bg2:#ffffff;--bg3:#f0efec;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#999890;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.14);
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#18181a;--bg2:#222224;--bg3:#2a2a2c;
    --text:#e8e8e4;--text2:#a0a09a;--text3:#666660;
    --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.14);
    --green-l:#0a2e1f;--green-d:#9FE1CB;
    --blue-l:#0a1e33;--blue-d:#85B7EB;
    --amber-l:#2a1e00;--amber-d:#FAC775;
    --red-l:#2a0a0a;--red-d:#F09595;
    --purple-l:#1a1840;--purple-d:#AFA9EC;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
a{color:var(--blue);text-decoration:none}
button{font-family:inherit;cursor:pointer}

/* ── Sidebar ── */
.sidebar{position:fixed;top:0;left:0;width:192px;height:100vh;background:var(--bg2);border-right:0.5px solid var(--border);display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.logo{padding:16px 14px 12px;border-bottom:0.5px solid var(--border)}
.logo-row{display:flex;align-items:center;gap:9px}
.logo-icon{width:30px;height:30px;border-radius:7px;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;flex-shrink:0}
.logo-name{font-size:14px;font-weight:600;letter-spacing:-0.4px}
.logo-tag{font-size:10px;color:var(--text3);margin-top:1px}
.nav{padding:6px 0;flex:1}
.nav-sec{padding:10px 14px 3px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;font-weight:500}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:12.5px;color:var(--text2);border:none;background:none;width:100%;text-align:left;transition:background .12s,color .12s;cursor:pointer}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--green);font-weight:500}
.nav-item i{font-size:14px;width:16px;text-align:center;flex-shrink:0}
.nav-footer{padding:12px 14px;border-top:0.5px solid var(--border)}
.user-row{display:flex;align-items:center;gap:8px}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--green-l);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--green-d);flex-shrink:0}
.user-name{font-size:12px;font-weight:500}
.user-plan{font-size:10px;color:var(--text3)}

/* ── Main ── */
.main{margin-left:192px;padding:20px 22px;min-height:100vh}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px}
.page-title{font-size:17px;font-weight:600;letter-spacing:-0.3px}
.page-sub{font-size:12px;color:var(--text3);margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn{padding:6px 12px;font-size:12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--bg3);color:var(--text)}
.btn-primary{background:var(--green);color:#fff;border-color:var(--green)}
.btn-primary:hover{background:var(--green-d);color:#fff}
.status-text{font-size:11px;color:var(--text3)}
.status-ok{color:var(--green-d)}
.status-warn{color:var(--amber-d)}

/* ── KPI Row ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:13px}
.kpi{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;border-left:3px solid var(--kpi-accent,transparent)}
.kpi-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
.kpi-value{font-size:18px;font-weight:600;line-height:1.2;letter-spacing:-0.3px}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px;display:flex;align-items:center;gap:4px}
.delta{display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600}
.delta-pos{background:var(--green-l);color:var(--green-d)}
.delta-neg{background:var(--red-l);color:var(--red-d)}
.delta-warn{background:var(--amber-l);color:var(--amber-d)}

/* ── Card ── */
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:12px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.card-title{font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.card-link{font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer;padding:0}
.row2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px;margin-bottom:12px}
.row3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:12px}

/* ── Table ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:5px 8px;color:var(--text3);font-weight:500;border-bottom:0.5px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:0.3px;text-align:left;white-space:nowrap}
td{padding:8px 8px;border-bottom:0.5px solid var(--border);color:var(--text);white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}

/* ── Misc ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600}
.badge-green{background:var(--green-l);color:var(--green-d)}
.badge-red{background:var(--red-l);color:var(--red-d)}
.badge-amber{background:var(--amber-l);color:var(--amber-d)}
.badge-blue{background:var(--blue-l);color:var(--blue-d)}
.badge-purple{background:var(--purple-l);color:var(--purple-d)}
.pos{color:var(--green)}
.neg{color:var(--red)}
.muted{color:var(--text3)}
.bar-wrap{background:var(--bg3);border-radius:99px;overflow:hidden}
.bar{height:100%;border-radius:99px;transition:width .5s ease}

/* ── Mini stat row ── */
.mini-stat{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:12px}
.mini-stat:last-child{border-bottom:none}

/* ── Piutang ── */
.piu-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:0.5px solid var(--border)}
.piu-row:last-child{border-bottom:none}
.piu-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.piu-info{flex:1;min-width:0}
.piu-name{font-size:13px;font-weight:500}
.piu-meta{font-size:11px;color:var(--text3);margin-top:1px}
.piu-prog{margin-top:6px}
.piu-amt{text-align:right;flex-shrink:0}
.piu-val{font-size:13px;font-weight:600}
.piu-date{font-size:10px;color:var(--text3);margin-top:2px}

/* ── Bank card ── */
.bank-card{border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:10px;position:relative;overflow:hidden;color:#fff}
.bank-card::after{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.07)}
.bk-label{font-size:10px;opacity:0.65;margin-bottom:4px}
.bk-val{font-size:20px;font-weight:700;letter-spacing:-0.5px}
.bk-name{font-size:11px;opacity:0.75;margin-top:8px}
.bk-bar{height:3px;border-radius:99px;background:rgba(255,255,255,0.2);margin-top:10px;overflow:hidden}
.bk-bar-fill{height:100%;border-radius:99px;background:rgba(255,255,255,0.6)}

/* ── AI Chat ── */
.ai-wrap{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:12px}
.ai-head{padding:12px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px}
.ai-pulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.chips{display:flex;gap:6px;flex-wrap:wrap;padding:10px 14px;border-bottom:0.5px solid var(--border)}
.chip{padding:4px 10px;background:var(--bg3);border:0.5px solid var(--border);border-radius:99px;font-size:11px;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .12s}
.chip:hover{border-color:var(--green);color:var(--green)}
.msgs{padding:14px 16px;min-height:180px;max-height:340px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.msg-row{display:flex;align-items:flex-end;gap:7px}
.msg-row.user{justify-content:flex-end}
.msg-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.bubble{padding:9px 12px;border-radius:10px;font-size:12px;line-height:1.65;max-width:84%}
.bubble.ai{background:var(--bg3);color:var(--text);border-bottom-left-radius:3px}
.bubble.user{background:var(--green);color:#fff;border-bottom-right-radius:3px}
.bubble.loading{opacity:.55;font-style:italic}
.ai-foot{padding:10px 14px;border-top:0.5px solid var(--border);display:flex;gap:8px}
.ai-inp{flex:1;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-size:12px;color:var(--text);outline:none;font-family:inherit}
.ai-inp:focus{border-color:var(--green)}
.ai-send{background:var(--green);color:#fff;border:none;border-radius:var(--radius);padding:8px 14px;font-size:13px;display:flex;align-items:center;gap:5px;transition:background .12s}
.ai-send:hover{background:var(--green-d)}
.ai-send:disabled{opacity:.4;cursor:not-allowed}

/* ── Donut ── */
.donut-wrap{position:relative;flex-shrink:0}
.donut-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;pointer-events:none}

/* ── FIRE progress bar ── */
.fire-bar{height:10px;border-radius:99px;background:var(--bg3);overflow:hidden;margin:8px 0}
.fire-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),var(--amber))}

/* ── Emergency meter ── */
.em-bar{border-radius:99px;background:var(--bg3);overflow:hidden;margin:8px 0}
.em-fill{height:100%;border-radius:99px}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ── Code block ── */
.code-block{background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px;font-family:'SF Mono',Monaco,monospace;font-size:11px;line-height:1.7;color:var(--text2);overflow-x:auto;margin-top:8px;white-space:pre}

/* ── Market price ── */
.mkt-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border)}
.mkt-row:last-child{border-bottom:none}
.mkt-sym{font-size:13px;font-weight:600}
.mkt-name{font-size:10px;color:var(--text3)}
.mkt-price{text-align:right}
.mkt-val{font-size:13px;font-weight:600}
.mkt-chg{font-size:10px;margin-top:1px}

/* ── Sim cards ── */
.sim-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.sim-card{background:var(--bg3);border-radius:var(--radius);padding:12px;text-align:center}
.sim-yr{font-size:10px;color:var(--text3);margin-bottom:5px}
.sim-val{font-size:15px;font-weight:600;letter-spacing:-0.3px}
.sim-real{font-size:10px;color:var(--green);margin-top:3px}

/* ── Info note ── */
.note{background:var(--amber-l);border:0.5px solid var(--amber);border-radius:var(--radius);padding:10px 12px;font-size:11px;color:var(--amber-d);line-height:1.7;margin-bottom:12px}
.note-green{background:var(--green-l);border-color:var(--green);color:var(--green-d)}

/* ── Responsive ── */
@media(max-width:768px){
  .sidebar{width:100%;height:auto;position:static;flex-direction:row;flex-wrap:wrap;border-right:none;border-bottom:0.5px solid var(--border)}
  .main{margin-left:0}
  .row2,.row3{grid-template-columns:1fr}
  .kpi-row{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-row">
      <div class="logo-icon">W</div>
      <div>
        <div class="logo-name">WealthOS</div>
        <div class="logo-tag">Personal Family Office</div>
      </div>
    </div>
  </div>
  <nav class="nav">
    <div class="nav-sec">Overview</div>
    <button class="nav-item active" data-page="dashboard"><i class="ti ti-layout-dashboard"></i>Dashboard</button>
    <button class="nav-item" data-page="bank"><i class="ti ti-building-bank"></i>Saldo Bank</button>
    <div class="nav-sec">Investasi</div>
    <button class="nav-item" data-page="portfolio"><i class="ti ti-chart-candle"></i>Portfolio</button>
    <button class="nav-item" data-page="market"><i class="ti ti-activity"></i>Market Data</button>
    <div class="nav-sec">Kewajiban</div>
    <button class="nav-item" data-page="debt"><i class="ti ti-credit-card"></i>Hutang</button>
    <button class="nav-item" data-page="piutang"><i class="ti ti-receipt"></i>Piutang</button>
    <div class="nav-sec">Perencanaan</div>
    <button class="nav-item" data-page="fire"><i class="ti ti-flame"></i>FIRE</button>
    <button class="nav-item" data-page="projection"><i class="ti ti-trending-up"></i>Proyeksi</button>
    <button class="nav-item" data-page="tax"><i class="ti ti-receipt-tax"></i>Pajak</button>
    <div class="nav-sec">AI</div>
    <button class="nav-item" data-page="ai"><i class="ti ti-brain"></i>AI Advisor</button>
  </nav>
  <div class="nav-footer">
    <div class="user-row">
      <div class="avatar">ZA</div>
      <div><div class="user-name">Zuma</div><div class="user-plan">Premium · WealthOS</div></div>
    </div>
  </div>
</div>

<div class="main" id="main"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
// ─────────────────────────────────────────────
// DATA — edit bagian ini sesuai portofolio Anda
// ─────────────────────────────────────────────
const DATA = {
  saham: [
    { kode:'BBCA', nama:'Bank Central Asia',   lot:50,  beli:8000,  kini:9750, div:190 },
    { kode:'TLKM', nama:'Telekomunikasi Indo.', lot:200, beli:3800,  kini:3200, div:168 },
    { kode:'ASII', nama:'Astra International', lot:100, beli:5800,  kini:4650, div:220 },
    { kode:'BMRI', nama:'Bank Mandiri',         lot:75,  beli:5200,  kini:6400, div:340 },
    { kode:'GOTO', nama:'GoTo Gojek Tokopedia', lot:500, beli:120,   kini:68,   div:0   },
  ],
  etf: [
    { ticker:'VOO', unit:5, basis:420, kini:518, div:6.6, wht:15 },
    { ticker:'QQQ', unit:3, basis:380, kini:487, div:1.8, wht:15 },
    { ticker:'VTI', unit:8, basis:210, kini:265, div:3.4, wht:15 },
  ],
  crypto: [
    { coin:'BTC', qty:0.12, basis:550000000, kini:1050000000 },
    { coin:'ETH', qty:1.5,  basis:45000000,  kini:62000000   },
    { coin:'SOL', qty:12,   basis:1800000,   kini:2300000    },
  ],
  p2p: [
    { platform:'Modalku',  borrower:'PT Maju Bersama', pokok:50000000, outstanding:42000000, rate:14.5, risk:'Medium' },
    { platform:'Investree', borrower:'CV Teknologi',   pokok:25000000, outstanding:25000000, rate:12.0, risk:'Low'    },
    { platform:'Koinworks', borrower:'UD Sejahtera',   pokok:30000000, outstanding:8000000,  rate:15.0, risk:'High'   },
  ],
  bank: [
    { bank:'BCA',    no:'***-1234', saldo:85000000, type:'Tabungan' },
    { bank:'Mandiri',no:'***-5678', saldo:35000000, type:'Tabungan' },
    { bank:'BRI',    no:'***-9012', saldo:22000000, type:'Tabungan' },
  ],
  piutang: [
    { nama:'Budi Santoso',  keperluan:'Modal usaha warung',    pokok:25000000, terbayar:15000000, jatuhTempo:'2025-09-01', status:'Lancar' },
    { nama:'PT Karya Muda', keperluan:'Pinjaman operasional',  pokok:50000000, terbayar:30000000, jatuhTempo:'2025-12-15', status:'Lancar' },
    { nama:'Rina Dewi',     keperluan:'Biaya pendidikan',      pokok:10000000, terbayar:10000000, jatuhTempo:'2025-06-01', status:'Lunas'  },
    { nama:'Ahmad Fauzi',   keperluan:'Modal bisnis online',   pokok:15000000, terbayar:2000000,  jatuhTempo:'2025-08-01', status:'Telat'  },
  ],
  debt: [
    { nama:'KPR Rumah',        tipe:'KPR',          outstanding:680000000, bunga:8.5,  cicilan:7200000  },
    { nama:'Kartu Kredit BCA', tipe:'Kartu Kredit', outstanding:12500000,  bunga:25.5, cicilan:12500000 },
    { nama:'Pinjaman Usaha',   tipe:'Pinjaman',     outstanding:145000000, bunga:11.0, cicilan:4100000  },
  ],
  deposito: 200000000,
  emas:     85000000,
  obligasi: 150000000,
  income:   35000000, // pendapatan bulanan
};

const USD = 16200; // kurs USD/IDR — update manual atau fetch dari API

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
const rp = n => {
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 1e12) return sign + 'Rp ' + (abs/1e12).toFixed(2) + ' T';
  if (abs >= 1e9)  return sign + 'Rp ' + (abs/1e9).toFixed(2)  + ' M';
  if (abs >= 1e6)  return sign + 'Rp ' + (abs/1e6).toFixed(1)  + ' jt';
  return sign + 'Rp ' + Math.round(abs).toLocaleString('id-ID');
};
const fmt = (n, d=0) => Math.round(n).toLocaleString('id-ID');
const pctChg = (now, then) => ((now/then - 1)*100).toFixed(1);

function calc() {
  const s = DATA.saham.reduce((a,x) => {
    const lot=100, n=x.lot*lot*x.kini, b=x.lot*lot*x.beli;
    return { v:a.v+n, b:a.b+b, d:a.d+x.lot*lot*x.div*0.9 };
  }, {v:0,b:0,d:0});
  const e = DATA.etf.reduce((a,x) => {
    const n=x.unit*x.kini*USD, b=x.unit*x.basis*USD;
    return { v:a.v+n, b:a.b+b, d:a.d+x.unit*x.div*USD*(1-x.wht/100) };
  }, {v:0,b:0,d:0});
  const c = DATA.crypto.reduce((a,x) => ({ v:a.v+x.qty*x.kini, b:a.b+x.qty*x.basis }), {v:0,b:0});
  const p = DATA.p2p.reduce((a,x) => ({ v:a.v+x.outstanding, d:a.d+x.outstanding*x.rate/100/12 }), {v:0,d:0});
  const bankTotal = DATA.bank.reduce((s,x) => s+x.saldo, 0);
  const piu = DATA.piutang.reduce((a,x) => ({
    total: a.total+(x.pokok-x.terbayar),
    pokok: a.pokok+x.pokok,
    terbayar: a.terbayar+x.terbayar
  }), {total:0,pokok:0,terbayar:0});
  const debt = DATA.debt.reduce((a,x) => ({ t:a.t+x.outstanding, c:a.c+x.cicilan }), {t:0,c:0});
  const aset = s.v+e.v+c.v+p.v+bankTotal+DATA.deposito+DATA.emas+DATA.obligasi+piu.total;
  const passive = s.d+e.d+p.d*12+DATA.deposito*0.055+DATA.obligasi*0.065;
  const emMonths = bankTotal / (DATA.income + passive/12);
  const wScore = wealthScore({s,e,c,p,bankTotal,debt,aset,passive,emMonths,piu});
  return {s,e,c,p,bankTotal,piu,debt,aset,net:aset-debt.t,passive,emMonths,wScore};
}

function wealthScore({s,e,c,p,bankTotal,debt,aset,passive,emMonths}) {
  let sc=0;
  const dr = debt.t/aset;
  sc += dr<0.2?25:dr<0.4?15:5;
  sc += emMonths>=6?20:emMonths>=3?12:4;
  sc += ((s.v>0?1:0)+(e.v>0?1:0)+(c.v>0?1:0)+(p.v>0?1:0))*5;
  const pc = (passive/12)/DATA.income;
  sc += pc>=0.5?20:pc>=0.3?12:5;
  const nw = aset-debt.t;
  sc += nw>1e9?15:nw>5e8?10:5;
  return Math.min(100,sc);
}

let marketPrices = {};
let marketStatus = 'idle'; // idle | loading | ok | error

async function fetchPrices() {
  const tickers = [
    ...DATA.saham.map(x => x.kode+'.JK'),
    ...DATA.etf.map(x => x.ticker),
  ];
  setStatus('loading', 'Mengambil harga live...');
  try {
    const res = await fetch('/api/prices?tickers='+tickers.join(','));
    if (!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    let updated = 0;
    DATA.saham.forEach(x => {
      const d = data[x.kode+'.JK'];
      if (d?.price) { x.kini = Math.round(d.price); marketPrices[x.kode+'.JK'] = d; updated++; }
    });
    DATA.etf.forEach(x => {
      const d = data[x.ticker];
      if (d?.price) { x.kini = parseFloat(d.price.toFixed(2)); marketPrices[x.ticker] = d; updated++; }
    });
    if (updated > 0) {
      setStatus('ok', `✓ Harga live diperbarui (${updated} instrumen)`);
      if (document.getElementById('main').dataset.page === 'dashboard') navTo('dashboard');
      if (document.getElementById('main').dataset.page === 'market') navTo('market');
    } else {
      setStatus('warn', '⚠ Tidak ada data baru — pakai harga manual');
    }
  } catch (err) {
    setStatus('error', '⚠ Gagal: '+err.message+' — pakai harga manual');
  }
}

function setStatus(type, msg) {
  marketStatus = type;
  const el = document.getElementById('mkt-status');
  if (el) {
    el.textContent = msg;
    el.className = 'status-text ' + (type==='ok'?'status-ok':type==='warn'||type==='error'?'status-warn':'');
  }
}

function initProjChart() {
  const a = calc();
  let ch = null;
  function update() {
    const cagr = parseInt(document.getElementById('cagr')?.value||12)/100;
    const infl = parseInt(document.getElementById('infl')?.value||5)/100;
    const inv  = parseInt(document.getElementById('inv')?.value||5)*1e6;
    document.getElementById('cagrV').textContent = Math.round(cagr*100)+'%';
    document.getElementById('inflV').textContent = Math.round(infl*100)+'%';
    document.getElementById('invV').textContent  = 'Rp'+Math.round(inv/1e6)+'jt';
    let nN=a.net, nR=a.net;
    const noms=[], reals=[], lbls=[];
    for(let i=0;i<=20;i++){
      lbls.push(new Date().getFullYear()+i);
      noms.push(+(nN/1e9).toFixed(2));
      reals.push(+(nR/1e9).toFixed(2));
      nN = nN*(1+cagr)+inv*12;
      nR = nR*(1+cagr-infl)+inv*12;
    }
    document.getElementById('simCards').innerHTML = [5,10,20].map(y => `
      <div class="sim-card">
        <div class="sim-yr">${y} Tahun (${new Date().getFullYear()+y})</div>
        <div class="sim-val">${rp(noms[y]*1e9)}</div>
        <div class="sim-real">Real: ${rp(reals[y]*1e9)}</div>
      </div>`).join('');
    if(ch) ch.destroy();
    ch = new Chart(document.getElementById('projC'), {
      type:'line',
      data:{labels:lbls, datasets:[
        {label:'Nominal',data:noms,borderColor:'#378ADD',fill:false,tension:0.4,pointRadius:2},
        {label:'Real',   data:reals,borderColor:'#888780',borderDash:[4,3],fill:false,tension:0.4,pointRadius:2}
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'Rp'+v+'M'}},x:{ticks:{maxTicksLimit:6}}}}
    });
  }
  setTimeout(() => {
    ['cagr','infl','inv'].forEach(id => document.getElementById(id)?.addEventListener('input', update));
    update();
  }, 100);
}

function initAI() {
  if (aiMsgs.length === 0) {
    const a = calc();
    aiMsgs = [{
      role:'ai',
      text:`Portofolio Anda sudah dianalisis. Net worth **${rp(a.net)}** dengan passive income **${rp(a.passive/12)}/bln**.\n\n3 hal prioritas:\n• **Kartu Kredit 25.5%** — bunga paling mahal, lunasi secepatnya\n• **Piutang Ahmad Fauzi** — status telat, sisa ${rp(13000000)}\n• **GOTO rugi 43%** — evaluasi hold atau cut loss`
    }];
  }
  renderMsgs();
}

function renderMsgs() {
  const el = document.getElementById('aiMsgs');
  if (!el) return;
  el.innerHTML = aiMsgs.map(m => `
    <div class="msg-row ${m.role==='user'?'user':''}">
      ${m.role==='ai' ? `<div class="msg-av" style="background:var(--green-l);color:var(--green-d)"><i class="ti ti-brain" style="font-size:11px"></i></div>` : ''}
      <div class="bubble ${m.role==='ai'?'ai':'user'} ${m.loading?'loading':''}">${m.text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</div>
      ${m.role==='user' ? `<div class="msg-av" style="background:var(--purple-l);color:var(--purple-d);font-size:10px;font-weight:700">ZA</div>` : ''}
    </div>`).join('');
  el.scrollTop = el.scrollHeight;
}

async function sendAI(msg) {
  const inp = document.getElementById('aiIn');
  const txt = msg || (inp?.value.trim() || '');
  if (!txt) return;
  if (inp) inp.value = '';
  aiMsgs.push({role:'user', text:txt});
  aiMsgs.push({role:'ai', text:'Menganalisis portofolio Anda...', loading:true});
  renderMsgs();
  const btn = document.getElementById('aiBtn');
  if (btn) btn.disabled = true;
  try {
    // Kirim ke /api/ai (Cloudflare Worker) — API key tidak pernah di-expose ke browser
    const res = await fetch('/api/ai', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        messages: [{role:'user', content: getCtx()+'\n\n---\nPertanyaan: '+txt}]
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || data.error || 'Terjadi kesalahan.';
    aiMsgs[aiMsgs.length-1] = {role:'ai', text:reply};
  } catch(err) {
    aiMsgs[aiMsgs.length-1] = {role:'ai', text:'Gagal terhubung ke AI: '+err.message};
  }
  renderMsgs();
  if (btn) btn.disabled = false;
}

function quickAsk(q) { sendAI(q); }
